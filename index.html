<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hao Zhong</title>
  <meta name="description" content="Hao Zhong — PhD student at Zhejiang University working on multimodal reasoning and reinforcement learning." />
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <!-- set theme before paint to avoid flash -->
  <script>
    (function () {
      var q = new URLSearchParams(location.search).get("theme");
      var t = q || localStorage.getItem("theme");
      if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <!-- ============ LEFT: profile rail ============ -->
    <aside class="rail" id="rail"></aside>

    <!-- ============ RIGHT: content ============ -->
    <main class="content">
      <section id="about" class="block">
        <h2>About</h2>
        <div id="about-body" class="prose"></div>
      </section>

      <section id="news" class="block">
        <h2>News</h2>
        <ul id="news-list" class="news"></ul>
      </section>

      <section id="publications" class="block">
        <div class="block-head">
          <h2>Publications</h2>
          <div class="pub-toggle" id="pub-toggle">
            <button data-filter="selected" class="on">Selected</button>
            <button data-filter="all">All</button>
          </div>
        </div>
        <p class="scholar-note">
          Author names link to
          <a href="https://scholar.google.com/citations?user=TnwXIMQAAAAJ">Google Scholar</a>.
          <span id="pub-count"></span>
        </p>
        <ol id="pub-list" class="pubs"></ol>
      </section>

      <section id="education" class="block">
        <h2>Education</h2>
        <div id="education-list" class="timeline"></div>
      </section>

      <footer class="foot">
        <span id="foot-name"></span> · Built as a static site, hosted on GitHub Pages.
      </footer>
    </main>
  </div>

  <button id="theme-btn" class="theme-btn" aria-label="Toggle dark mode" title="Toggle theme"></button>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
